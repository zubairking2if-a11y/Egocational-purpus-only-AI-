version: "3.8"
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
  frontend:
    image: node:18
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    command: ["sh", "-c", "npm install && npm run dev"]
