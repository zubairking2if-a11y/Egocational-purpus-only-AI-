version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JWT_SECRET_KEY=your-production-secure-key
      - SANDBOX_MAX_EXEC_TIME=300
    networks:
      - app-net
      - pentest-sandbox-net
    ports:
      - "8000:8000"
networks:
  app-net:
    driver: bridge
  pentest-sandbox-net:
    driver: bridge
    internal: true
